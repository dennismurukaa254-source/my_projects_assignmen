name: family_connect_stable
description: "Family Connect - Connecting Generations, Preserving Legacy"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.2
  firebase_storage: ^12.3.6

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Utilities
  intl: ^0.19.0

  # UI
  fl_chart: ^0.69.0
  graphview: ^1.5.1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

# App icon configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A2F44"
 # adaptive_icon_foreground: "assets/icon/foreground.png"   # optional, remove if not used
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0A2F44"
    theme_color: "#D4AF37"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"